<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Apple-style rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0B0E1A"/>
  <!-- Glass sheen — top-left highlight -->
  <rect width="32" height="32" rx="7" fill="url(#glass)"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="#00DFFF" stroke-opacity="0.12"/>

  <!-- Circuit traces (corners, very subtle) -->
  <polyline points="3,10 3,4 9,4" stroke="#00DFFF" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <polyline points="29,22 29,28 23,28" stroke="#00DFFF" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <circle cx="3" cy="4" r="0.7" fill="#00DFFF" opacity="0.25"/>
  <circle cx="29" cy="28" r="0.7" fill="#00DFFF" opacity="0.25"/>

  <!-- P glow layer (soft cyan bloom behind letter) -->
  <path d="M9.5 26V7H18.5C22.2 7 24.5 9 24.5 11.5C24.5 14 22.2 16 18.5 16H9.5"
        stroke="#00DFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glowCyan)" opacity="0.18"/>

  <!-- P letter — main stroke -->
  <path d="M9.5 26V7H18.5C22.2 7 24.5 9 24.5 11.5C24.5 14 22.2 16 18.5 16H9.5"
        stroke="url(#pGrad)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Diamond accent at P junction (electric rose) -->
  <path d="M9.5 13.8 L12 16 L9.5 18.2 L7 16 Z" fill="#FF3366"/>
  <!-- Diamond glow -->
  <path d="M9.5 13.8 L12 16 L9.5 18.2 L7 16 Z" fill="#FF3366" filter="url(#glowPink)" opacity="0.7"/>
  <!-- Diamond specular highlight -->
  <path d="M9.5 13.8 L11 15.3 L9.5 15" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <defs>
    <!-- Glass sheen: radial top-left -->
    <radialGradient id="glass" cx="0.22" cy="0.12" r="0.85" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- P stroke gradient: ice blue → true blue -->
    <linearGradient id="pGrad" x1="9.5" y1="7" x2="24.5" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00DFFF"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Cyan glow filter -->
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- Pink glow filter -->
    <filter id="glowPink" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
</svg>
